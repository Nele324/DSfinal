<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Order Processing</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding-top: 50px; background-color: #f4f6f9; }
        .card { background: white; padding: 40px; border-radius: 8px; display: inline-block; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .spinner { border: 4px solid rgba(0, 0, 0, 0.1); width: 36px; height: 36px; border-radius: 50%; border-left-color: #09d; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="card">
        <div class="spinner"></div>
        <h2>Your order is being processed...</h2>
        <p th:text="${message}"></p>
        <p><strong>Order ID:</strong> <span th:text="${orderId}"></span></p>
        <p style="color: #666; font-size: 14px;">You can leave this page or the webshop now. Our systems will complete the transaction in the background.</p>
        <a href="/" style="display:inline-block; margin-top:20px; padding:10px 20px; background:#09d; color:white; text-decoration:none; border-radius:4px;">Terug naar de Webshop</a>
    </div>
</body>
</html>
