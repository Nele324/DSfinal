<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Review Your Order | Gatherly</title>
    <style>
        /* --- COPY THE CSS FROM INDEX.HTML HERE --- */
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --success: #27ae60;
            --light: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background-color: var(--light);
            color: #333;
        }

        header {
            background: var(--primary);
            color: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .main-container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .scroll-box {
            background: white;
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border: 1px solid #ddd;
        }

        .btn-review {
            background: var(--success);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: opacity 0.3s;
        }

        .status-badge {
            background: rgba(255,255,255,0.2);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

<header>
    <div>
        <h2 style="margin:0;">EventFlow Broker</h2>
    </div>
    <div class="status-badge">
        System Status: <span th:text="${status != null ? status : 'Online'}">Online</span>
    </div>
    <div style="width: 25px;"></div> </header>

<div class="main-container">
    <h2>Review Your Event Plan</h2>

    <div class="scroll-box" style="border: 2px solid #3498db;">
        <h3>Selection Summary</h3>
        <p><strong>Event Date:</strong> <span th:text="${orderRequest.date}">2024-01-01</span></p>
        <p><strong>Venue:</strong> <span th:text="${venue.name}">Grand Ballroom</span></p>
        <p><strong>Catering:</strong> <span th:text="${catering.name}">Luxury Buffet</span></p>
        <p><strong>Delivery Address:</strong> <span th:text="${orderRequest.address}">Address</span></p>
        <p><strong>Card Number:</strong> <span th:text="${orderRequest.cardNumber}">**** **** **** 1234</span></p>
        <hr>
        <h2 style="color: #27ae60;">Total Price: $<span th:text="${totalPrice}">0.00</span></h2>
    </div>

    <div style="display: flex; gap: 20px; margin-top: 20px;">
        <button onclick="window.history.back()" class="btn-review" style="background: #7f8c8d; width: 200px;">Go Back & Change</button>

        <form th:action="@{/broker/confirm-order}" method="post" style="flex-grow: 1;">
            <input type="hidden" name="orderId" th:value="${orderId}">
            <input type="hidden" name="selectedVenue" th:value="${orderRequest.selectedVenue}">
            <input type="hidden" name="selectedCatering" th:value="${orderRequest.selectedCatering}">
            <input type="hidden" name="address" th:value="${orderRequest.address}">
            <input type="hidden" name="cardNumber" th:value="${orderRequest.cardNumber}">
            <input type="hidden" name="date" th:value="${orderRequest.date}">
            <input type="hidden" name="totalPrice" th:value="${totalPrice}">

            <button type="submit" class="btn-review" id="confirmBtn" style="width: 100%;">Confirm & Pay</button>
        </form>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const confirmBtn = document.getElementById('confirmBtn');
        const form = document.querySelector('form');

        if (form) {
            form.onsubmit = function() {
                confirmBtn.innerHTML = "🚀 Processing Reservation...";
                confirmBtn.style.backgroundColor = "#95a5a6";
                confirmBtn.disabled = true;
            };
        }
    });
</script>

</body>
</html>
