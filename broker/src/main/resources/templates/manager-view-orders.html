<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Manager Portal | Orders</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            background: #f4f6f8;
        }

        header {
            background: #2c3e50;
            color: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .header-buttons {
            display: flex;
            gap: 20px;
        }

        .header-buttons a {
            color: white;
            text-decoration: none;
            font-weight: bold;
        }

        .header-buttons a:hover {
            color: #3498db;
        }

        .container {
            max-width: 1600px;
            margin: 2rem auto;
            overflow-x: auto;
            padding: 0 2rem;
        }
        h1 { color: #2c3e50; }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        th {
            background: #34495e;
            color: white;
            padding: 12px;
            text-align: left;
            font-size: 0.9rem;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        td { padding: 12px; border-bottom: 1px solid #ecf0f1; font-size: 0.85rem; }
        tr:last-child td { border-bottom: none; }
        .logout { float: right; color: #e74c3c; text-decoration: none; }
        .status-cancelled { background: #e2e3e5; color: #383d41; padding: 4px 8px; border-radius: 4px; }
        .status-confirmed { background: #d4edda; color: #155724; padding: 4px 8px; border-radius: 4px; }
        .status-reserved { background: #fff3cd; color: #856404; padding: 4px 8px; border-radius: 4px; }
        .status-failed { background: #f8d7da; color: #721c24; padding: 4px 8px; border-radius: 4px; }
        .status-rollback-incomplete { background: #f5c6cb; color: #721c24; padding: 4px 8px; border-radius: 4px; font-weight: bold; }
        .status-retrying { background: #e2e3e5; color: #383d41; padding: 4px 8px; border-radius: 4px; }
        .timestamp { color: #7f8c8d; font-size: 0.8rem; }
        /* .container { max-width: 1600px; margin: 0 auto; overflow-x: auto; } */
        .table-wrapper {
            max-height: calc(100vh - 220px);
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        .retry-info { color: #9b59b6; font-size: 0.75rem; font-weight: bold; }
        .pending-comps { color: #e74c3c; font-size: 0.8rem; }
    </style>
</head>
<body>

<header>
    <h2 style="margin:0;">Book My Event - Manager Portal</h2>

    <div class="header-buttons">
        <a th:href="@{/}">Home</a>

        <a th:href="@{/logout}">
            Logout
        </a>
    </div>
</header>

<h1 style="padding:2rem 2rem 1rem 2rem;">
    All Orders
</h1>    

<div class="container">

    <div class="mb-4 w-full">
        <label for="orderSearch" class="block text-sm font-medium text-slate-700 mb-1.5">
            Search Orders
        </label>

        <input type="text" id="orderSearch" onkeyup="filterOrders()"
               placeholder="Search orders by ID, status, date, venue..."
               class="w-full px-4 py-2 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-slate-900 bg-white text-sm text-slate-900 placeholder-slate-400">
    </div>

    <div class="table-wrapper">
<table>
    <thead>
    <tr>
        <th>Order ID</th>
        <th>Status</th>
        <th>Created At</th>
        <th>Event Date</th>
        <th>Venue</th>
        <th>Catering</th>
        <th>Address</th>
        <th>Card</th>
        <th>Total Price</th>
        <th>Recovery Status</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="order : ${orders}">
        <td th:text="${order.id}"></td>
        <td>
            <span th:if="${order.status == 'CONFIRMED'}" class="status-confirmed" th:text="${order.status}"></span>
            <span th:if="${order.status == 'RESERVED'}" class="status-reserved" th:text="${order.status}"></span>
            <span th:if="${order.status == 'CANCELLED'}" class="status-cancelled" th:text="${order.status}"></span>
            <span th:if="${order.status == 'FAILED_ROLLED_BACK'}" class="status-failed" th:text="${order.status}"></span>
            <span th:if="${order.status == 'FAILED_ROLLBACK_INCOMPLETE'}" class="status-rollback-incomplete" th:text="${order.status}"></span>
            <span th:if="${order.status == 'FAILED_PERMANENT'}" class="status-failed" th:text="${order.status}"></span>
            <span th:unless="${order.status == 'CONFIRMED' || order.status == 'RESERVED' || order.status == 'FAILED_ROLLED_BACK' || order.status == 'CANCELLED' || order.status == 'FAILED_ROLLBACK_INCOMPLETE' || order.status == 'FAILED_PERMANENT'}" th:text="${order.status}"></span>
        </td>
        <td class="timestamp" th:text="${#dates.format(order.createdAt, 'yyyy-MM-dd HH:mm:ss')}"></td>
        <td th:text="${#dates.format(order.date, 'yyyy-MM-dd')}"></td>
        <td th:text="${order.venueId}"></td>
        <td th:text="${order.cateringId}"></td>
        <td th:text="${order.address}"></td>
        <td th:text="${order.cardNumber}"></td>
        <td th:text="'$' + ${order.totalPrice}"></td>
        <td>
            <div th:if="${order.pendingCompensations != null && !#strings.isEmpty(order.pendingCompensations)}">
                <div class="retry-info">🔄 Retrying...</div>
                <div class="pending-comps" th:text="'Pending: ' + ${order.pendingCompensations}"></div>
                <div class="retry-info" th:text="'Attempt: ' + ${order.retryCount} + '/5'"></div>
                <div class="timestamp" th:if="${order.lastRetryTime != null}" th:text="'Last: ' + ${#dates.format(order.lastRetryTime, 'HH:mm:ss')}"></div>
            </div>
            <div th:unless="${order.pendingCompensations != null && !#strings.isEmpty(order.pendingCompensations)}" class="timestamp">
                ✓ Complete
            </div>
        </td>
    </tr>
    </tbody>
</table>
    </div>
</div>

<script>
    function filterOrders() {
        // Get the string the manager typed and turn it lowercase
        let input = document.getElementById("orderSearch");
        let filter = input.value.toLowerCase();

        // Target the table rows
        let table = document.querySelector("table");
        let tr = table.getElementsByTagName("tr");

        // Loop through all table rows (skipping the header row at index 0)
        for (let i = 1; i < tr.length; i++) {
            // Get all the text content inside this specific row combined
            let rowText = tr[i].textContent || tr[i].innerText;

            if (rowText.toLowerCase().indexOf(filter) > -1) {
                tr[i].style.display = "";      // Show the row if it matches
            } else {
                tr[i].style.display = "none";  // Hide the row if it doesn't match
            }
        }
    }
</script>

</body>
</html>
