spring.application.name=broker
server.port=8081

catering.service.url=http://localhost:8082
venue.service.url=http://localhost:8083

spring.datasource.url=jdbc:sqlserver://broker.database.windows.net:1433;database=broker;encrypt=true;trustServerCertificate=false;hostNameInCertificate=*.database.windows.net;loginTimeout=30;
spring.datasource.username=broker_login
spring.datasource.password=Password!
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# JPA/Hibernate instellingen
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
#spring.jpa.hibernate.naming.physical-strategy=org.springframework.boot.orm.jpa.hibernate.SpringPhysicalNamingStrategy
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

# Enable scheduling for SAGA retry mechanism
spring.task.scheduling.thread-name-prefix=retry-scheduler-
spring.task.scheduling.pool.size=2

# Zorg dat alle INFO logs van jouw eigen applicatie getoond worden
logging.level.com.DSfinal.broker=INFO

# OPTIONEEL: Zie exact welke HTTP-verzoeken RestTemplate verstuurt (headers, URL's)
logging.level.org.springframework.web.client.RestTemplate=DEBUG

